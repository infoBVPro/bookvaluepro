<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0f1214;--ink-2:#3a3f45;--ink-3:#7a8290;
  --cream:#f7f4ef;--cream-2:#ede9e2;--white:#ffffff;
  --accent:#1a5c3e;--accent-2:#2a8558;--accent-l:#e8f5ee;
  --gold:#c8943a;--gold-l:#fdf4e7;--gold-2:#a97830;
  --blue:#1e4fa8;--blue-l:#e8eefb;--blue-2:#163b80;
  --mono:'DM Mono',monospace;--serif:'DM Serif Display',serif;--sans:'DM Sans',sans-serif;
  --shadow:0 1px 4px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);
}
html,body{background:var(--cream);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh}
header{background:var(--white);border-bottom:1px solid var(--cream-2);padding:18px 40px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.logo-mark{font-family:var(--serif);font-size:20px;color:var(--accent)}
.header-right{display:flex;align-items:center;gap:20px}
.book-name{font-family:var(--mono);font-size:12px;color:var(--ink-3);background:var(--cream);border:1px solid var(--cream-2);padding:4px 10px;border-radius:6px}
.steps{display:flex;align-items:center}
.step{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink-3)}
.step.active{color:var(--ink);font-weight:500}.step.done{color:var(--accent-2)}
.step-num{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;background:var(--cream-2);color:var(--ink-3)}
.step.active .step-num{background:var(--accent);color:#fff}.step.done .step-num{background:var(--accent-2);color:#fff}
.step-sep{width:24px;height:1px;background:var(--cream-2);margin:0 4px}
.page{max-width:1280px;margin:0 auto;padding:36px 40px 80px}
.page-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:16px}
.page-title{font-family:var(--serif);font-size:32px;letter-spacing:-.02em}
.page-sub{font-size:13px;color:var(--ink-3);font-weight:300;margin-top:4px}
.filter-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.filter-btn{display:flex;align-items:center;gap:6px;font-family:var(--sans);font-size:12px;font-weight:500;padding:6px 14px;border-radius:20px;border:1.5px solid var(--cream-2);cursor:pointer;transition:all .15s;background:var(--white);color:var(--ink-2)}
.filter-btn.active-all{background:var(--ink);color:#fff;border-color:var(--ink)}
.filter-btn.active-ss{background:var(--accent-l);color:var(--accent);border-color:var(--accent-2)}
.filter-btn.active-sb{background:var(--blue-l);color:var(--blue);border-color:var(--blue)}
.filter-btn.active-lw{background:var(--gold-l);color:var(--gold-2);border-color:var(--gold)}
.filter-dot{width:7px;height:7px;border-radius:50%}
.lead-control{display:flex;align-items:center;gap:10px;background:var(--white);border:1.5px solid var(--cream-2);border-radius:10px;padding:8px 16px}
.lead-control label{font-size:12px;color:var(--ink-2);font-weight:500;white-space:nowrap}
.lead-input{width:52px;font-family:var(--mono);font-size:14px;font-weight:500;color:var(--accent);border:none;outline:none;background:transparent;text-align:center}
.lead-unit{font-size:12px;color:var(--ink-3)}
.summary-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:32px}
.summary-card{background:var(--white);border:1px solid var(--cream-2);border-radius:12px;padding:16px 20px;box-shadow:var(--shadow)}
.summary-val{font-family:var(--serif);font-size:26px;color:var(--ink);letter-spacing:-.02em;line-height:1}
.summary-lbl{font-size:12px;color:var(--ink-3);margin-top:5px;font-weight:300}
.month-list{display:flex;flex-direction:column;gap:12px}
.month-card{background:var(--white);border:1px solid var(--cream-2);border-radius:12px;box-shadow:var(--shadow);overflow:hidden;transition:box-shadow .2s}
.month-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.09)}
.month-card.current-month{border-color:var(--accent-2);box-shadow:0 0 0 2px rgba(42,133,88,.12),var(--shadow)}
.month-card.past-month{opacity:.6}
.month-card.empty-month{opacity:.3;pointer-events:none}
.month-header{padding:18px 24px;cursor:pointer;user-select:none;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid transparent;transition:background .15s,border-color .15s}
.month-card.open .month-header{border-bottom-color:var(--cream-2);background:var(--cream)}
.month-header-left{display:flex;align-items:center;gap:16px;flex:1;flex-wrap:wrap}
.month-name{font-family:var(--serif);font-size:22px;color:var(--ink);letter-spacing:-.01em;min-width:140px}
.month-badge{font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;padding:2px 8px;border-radius:4px}
.badge-current{background:var(--accent);color:#fff}.badge-past{background:var(--cream-2);color:var(--ink-3)}
.cohort-pills{display:flex;gap:6px;flex-wrap:wrap}
.c-pill{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:500;padding:3px 9px;border-radius:12px}
.c-pill.ss{background:var(--accent-l);color:var(--accent)}.c-pill.sb{background:var(--blue-l);color:var(--blue-2)}.c-pill.lw{background:var(--gold-l);color:var(--gold-2)}
.c-pill-dot{width:5px;height:5px;border-radius:50%}
.c-pill.ss .c-pill-dot{background:var(--accent-2)}.c-pill.sb .c-pill-dot{background:var(--blue)}.c-pill.lw .c-pill-dot{background:var(--gold)}
.month-header-right{display:flex;align-items:center;gap:16px;flex-shrink:0;margin-left:16px}
.month-opp{font-family:var(--mono);font-size:13px;color:var(--accent);font-weight:500}
.chevron{color:var(--ink-3);font-size:14px;transition:transform .2s}
.month-card.open .chevron{transform:rotate(180deg)}
.policy-table-wrap{display:none;overflow-x:auto}
.month-card.open .policy-table-wrap{display:block}
.cohort-section-header{display:flex;align-items:center;gap:10px;padding:10px 24px 8px;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;border-bottom:1px solid var(--cream-2)}
.cohort-section-header.ss{background:#f4faf7;color:var(--accent)}.cohort-section-header.sb{background:#f0f4fc;color:var(--blue-2)}.cohort-section-header.lw{background:#fdf8f0;color:var(--gold-2)}
.cohort-count{margin-left:auto;opacity:.6}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:900px}
thead th{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);padding:10px 16px;text-align:left;border-bottom:1px solid var(--cream-2);background:#fafaf8;white-space:nowrap}
thead th.num{text-align:right}
tbody tr{border-bottom:1px solid var(--cream-2);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--cream)}
tbody td{padding:12px 16px;color:var(--ink-2);white-space:nowrap;vertical-align:middle}
tbody td.num{text-align:right;font-family:var(--mono);font-size:12px}
tbody td.name-cell{font-weight:500;color:var(--ink);min-width:140px}
.carrier-badge{font-family:var(--mono);font-size:10px;font-weight:500;background:var(--cream);border:1px solid var(--cream-2);padding:2px 7px;border-radius:4px;color:var(--ink-2)}
.opp-val{color:var(--accent);font-family:var(--mono);font-size:12px;font-weight:500}
.sav-val{color:var(--gold-2);font-family:var(--mono);font-size:12px}
.contact-link{color:var(--accent-2);text-decoration:none;font-size:12px}
.contact-link:hover{text-decoration:underline}
.no-contact{color:var(--cream-2);font-size:11px}
.dur-badge{font-family:var(--mono);font-size:11px;color:var(--ink-3)}
.no-policies-row td{padding:16px 24px;font-size:13px;color:var(--ink-3);font-style:italic;text-align:center}
@media(max-width:768px){.page{padding:20px 16px 60px}header{padding:14px 20px}.summary-strip{grid-template-columns:repeat(2,1fr)}}
</style>
</head>

// ── SYNC SAVINGS % FROM DASHBOARD ───────────────────────────────────
// Reads the value saved by the dashboard slider so both screens stay in sync.
const SAVINGS_PCT = +(localStorage.getItem('bvp_savings_pct') || 10);

const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const CURRENT_MONTH=4; // May 2026 = month 5; April 2026 = month 4
const fmt$=v=>'$'+Math.round(v).toLocaleString();

// Compute contact month: effMonth shifted back by leadMonths, wrapping around calendar
function contactMonth(effMonth, leadMonths){
  return ((effMonth - leadMonths - 1 + 12*10) % 12) + 1;
}

// Return policies whose contact month (given leadMonths) matches m
function policiesForMonth(m, leadMonths){
  return POLICIES.filter(p => contactMonth(p.month, leadMonths) === m);
}

// Recompute monthly savings using live savings %
function liveMonSav(p){ return p.currPrem * (SAVINGS_PCT / 100); }
function liveOppNPV(p){ return p.renNPV * (SAVINGS_PCT / 10); }  // renNPV stored at 10% baseline
const fmtK=v=>'$'+(Math.abs(v)>=1000?(Math.abs(v)/1000).toFixed(1)+'K':Math.round(Math.abs(v)));

let activeFilter='all';
let leadMonths=3;
let openMonths=new Set([CURRENT_MONTH]);

function setFilter(f){
  activeFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>{
    b.className='filter-btn';
    if(b.dataset.filter===f) b.classList.add(f==='all'?'active-all':f==='1'?'active-ss':f==='2'?'active-sb':'active-lw');
  });
  renderAll();
}

function filtered(m){return policiesForMonth(m,leadMonths).filter(p=>activeFilter==='all'||p.priority===+activeFilter);}

function renderSummary(){
  const ssCount=POLICIES.filter(p=>p.priority===1).length;
  const retCount=POLICIES.filter(p=>p.priority!==1).length;
  const totalLift=POLICIES.filter(p=>p.priority===1).reduce((s,p)=>s+Math.max(0,p.renNPV-p.currNPV),0);
  document.getElementById('summary-strip').innerHTML=`
    <div class="summary-card"><div class="summary-val">${POLICIES.length}</div><div class="summary-lbl">Total policies in schedule</div></div>
    <div class="summary-card" style="border-top:3px solid var(--accent-2)"><div class="summary-val" style="color:var(--accent)">${ssCount}</div><div class="summary-lbl">Save &amp; Switch contacts</div></div>
    <div class="summary-card" style="border-top:3px solid var(--blue)"><div class="summary-val" style="color:var(--blue)">${retCount}</div><div class="summary-lbl">Retention contacts</div></div>
    <div class="summary-card" style="border-top:3px solid var(--gold)"><div class="summary-val" style="color:var(--accent)">${fmtK(totalLift)}</div><div class="summary-lbl">Total NPV uplift opportunity</div></div>`;
}

function renderCalendar(){
  const list=document.getElementById('month-list');
  list.innerHTML='';
  for(let m=1;m<=12;m++){
    const all=policiesForMonth(m,leadMonths);
    const ss=all.filter(p=>p.priority===1),sb=all.filter(p=>p.priority===2),lw=all.filter(p=>p.priority===3);
    const ssLift=ss.reduce((s,p)=>s+Math.max(0,p.renNPV-p.currNPV),0);
    const isCurrent=m===CURRENT_MONTH,isPast=m<CURRENT_MONTH,isEmpty=all.length===0,isOpen=openMonths.has(m);
    let cls='month-card';
    if(isCurrent)cls+=' current-month';if(isPast)cls+=' past-month';if(isEmpty)cls+=' empty-month';if(isOpen)cls+=' open';
    const card=document.createElement('div');
    card.className=cls;card.id=`month-${m}`;
    card.innerHTML=`
      <div class="month-header" onclick="toggleMonth(${m})">
        <div class="month-header-left">
          <span class="month-name">${MONTHS[m-1]}</span>
          ${isCurrent?'<span class="month-badge badge-current">This month</span>':''}
          ${isPast?'<span class="month-badge badge-past">Past</span>':''}
          <div class="cohort-pills">
            ${ss.length?`<span class="c-pill ss"><span class="c-pill-dot"></span>${ss.length} Save &amp; Switch</span>`:''}
            ${sb.length?`<span class="c-pill sb"><span class="c-pill-dot"></span>${sb.length} Steady Book</span>`:''}
            ${lw.length?`<span class="c-pill lw"><span class="c-pill-dot"></span>${lw.length} Loyalty Watch</span>`:''}
            ${isEmpty?'<span style="font-size:12px;color:var(--ink-3)">No contacts this month</span>':''}
          </div>
        </div>
        <div class="month-header-right">
          ${ssLift>0?`<span class="month-opp">+${fmtK(ssLift)} NPV opp.</span>`:''}
          <span class="chevron">▾</span>
        </div>
      </div>
      <div class="policy-table-wrap" id="ptable-${m}">${buildTable(m)}</div>`;
    list.appendChild(card);
  }
}

function buildTable(m){
  const vis=filtered(m);
  if(!vis.length) return`<table><tbody><tr class="no-policies-row"><td colspan="10">No policies match the current filter.</td></tr></tbody></table>`;
  const ss=vis.filter(p=>p.priority===1).sort((a,b)=>a.rank-b.rank);
  const sb=vis.filter(p=>p.priority===2).sort((a,b)=>a.rank-b.rank);
  const lw=vis.filter(p=>p.priority===3).sort((a,b)=>a.rank-b.rank);
  const thead=`<thead><tr>
    <th>Client</th><th>Carrier</th><th>State</th><th class="num">Age</th>
    <th class="num">Current premium</th><th class="num">Current NPV</th>
    <th class="num">Duration</th><th class="num">Est. mo. savings</th>
    <th class="num">Opportunity NPV</th><th>Contact</th>
  </tr></thead>`;
  const rows=(policies,cls,label)=>{
    if(!policies.length)return'';
    return`<tr><td colspan="10" style="padding:0">
      <div class="cohort-section-header ${cls}">${label}<span class="cohort-count">${policies.length} client${policies.length>1?'s':''}</span></div>
    </td></tr>`+policies.map(p=>`<tr>
      <td class="name-cell">${p.name}</td>
      <td><span class="carrier-badge">${p.company}</span></td>
      <td><span class="carrier-badge">${p.state || '—'}</span></td>
      <td class="num"><span class="dur-badge">${p.age ?? '—'}</span></td>
      <td class="num">${fmt$(p.currPrem)}/mo</td>
      <td class="num">${fmt$(p.currNPV)}</td>
      <td class="num"><span class="dur-badge">Yr ${p.duration}</span></td>
      <td class="num"><span class="sav-val">${fmt$(liveMonSav(p))}/mo</span></td>
      <td class="num"><span class="opp-val">${fmt$(p.renNPV)}</span></td>
      <td>${p.phone?`<a class="contact-link" href="tel:${p.phone}">${p.phone}</a>`:''}${p.phone&&p.email?' · ':''}${p.email?`<a class="contact-link" href="mailto:${p.email}">${p.email}</a>`:''} ${!p.phone&&!p.email?'<span class="no-contact">—</span>':''}</td>
    </tr>`).join('');
  };
  return`<table>${thead}<tbody>${rows(ss,'ss','Save &amp; Switch')}${rows(sb,'sb','Steady Book')}${rows(lw,'lw','Loyalty Watch')}</tbody></table>`;
}

function toggleMonth(m){
  const card=document.getElementById(`month-${m}`);
  if(openMonths.has(m)){openMonths.delete(m);card.classList.remove('open');}
  else{openMonths.add(m);card.classList.add('open');document.getElementById(`ptable-${m}`).innerHTML=buildTable(m);}
}

function renderAll(){
  const ind = document.getElementById('savings-indicator');
  if(ind) ind.textContent = SAVINGS_PCT + '% avg. savings assumption';
  renderSummary();
  renderCalendar();
}

document.addEventListener('DOMContentLoaded', function(){
  const inp = document.getElementById('lead-months');
  if(inp){
    inp.addEventListener('change', function(){
      const v = Math.max(1, Math.min(6, +this.value || 3));
      this.value = v;
      leadMonths = v;
      // Recompute which month should be "open" — the one that corresponds to current contact month
      openMonths = new Set([CURRENT_MONTH]);
      renderAll();
    });
  }
});
// ── SUPABASE INIT ─────────────────────────────────────────────
let bvpSession = null;
let bvpBook    = null;

async function initFromSupabase() {
  bvpSession = await bvpRequireAuth();
  if (!bvpSession) return;

  const nameEl = document.getElementById('agent-name');
  if (nameEl) nameEl.textContent = bvpSession.user.email;

  bvpBook = await bvpGetActiveBook(bvpSession.user.id);

  if (bvpBook) {
    // Restore savings % assumption from book
    if (bvpBook.savings_pct) {
      const savedPct = bvpBook.savings_pct;
      localStorage.setItem('bvp_savings_pct', savedPct);
    }

    // Load policies from Supabase and replace embedded POLICIES array
    const dbPolicies = await bvpGetPolicies(bvpBook.id);
    if (dbPolicies.length > 0) {
      POLICIES.length = 0;
      dbPolicies.forEach(p => {
        POLICIES.push({
          idx:      p.policy_idx,
          name:     [p.first_name, p.last_name].filter(Boolean).join(' ') || ('Policy #' + p.policy_idx),
          company:  p.company,
          state:    p.issued_state,
          age:      p.attained_age,
          month:    p.eff_month,
          rank:     p.policy_idx,
          priority: p.priority,
          currPrem: p.curr_prem,
          newPrem:  p.curr_prem * (1 - (SAVINGS_PCT / 100)),
          moSav:    p.curr_prem * (SAVINGS_PCT / 100),
          annSav:   p.curr_prem * (SAVINGS_PCT / 100) * 12,
          duration: p.duration_yr,
          currNPV:  p.curr_npv,
          renNPV:   p.ren_npv,
          email:    p.email,
          phone:    p.phone,
        });
      });
    }

    // Update book name in header
    const bnEl = document.getElementById('book-name');
    if (bnEl) bnEl.textContent = bvpBook.file_name + ' — ' + bvpBook.policy_count + ' policies';
  }

  renderAll();
}

initFromSupabase();
